<div class="form-container">
  <header>
    <button (click)="voltar()" class="btn-secondary">← Voltar</button>
    <h2>Cadastrar Novo Atleta</h2>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (errorMessage()) {
      <div class="error-message">{{ errorMessage() }}</div>
    }

    <div class="input-group">
      <label>Nome Completo</label>
      <input formControlName="nome" placeholder="Ex: João Silva" />
    </div>

    <div class="input-group">
      <label>CPF (Apenas números)</label>
      <input formControlName="cpf" placeholder="12345678901" maxlength="11" />
    </div>

    <div class="row">
      <div class="input-group">
        <label>Idade</label>
        <input type="number" formControlName="idade" />
      </div>
      <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" formControlName="peso" step="0.1" />
      </div>
      <div class="input-group">
        <label>Altura (m)</label>
        <input type="number" formControlName="altura" step="0.01" />
      </div>
    </div>

    <div class="input-group">
      <label>Sexo</label>
      <select formControlName="sexo">
        <option value="M">Masculino</option>
        <option value="F">Feminino</option>
      </select>
    </div>

    <button type="submit" [disabled]="form.invalid || loading()" class="btn-submit">
      @if (loading()) { Salvando... } @else { Finalizar Cadastro }
    </button>
  </form>
</div>
